# OKF domain contract for: okpack-indicators — Indicators & Infrastructure (IOCs).
# The engine reads this (never hardcodes layout). STARTER taxonomy — refine the
# types/fields for your domain. See pack-template/BUILDING-A-PACK.md §3.
version: 1
apply_under: [wiki/]
exclude:
  - wiki/operational/

okf:
  required: [type]            # OKF v0.1 base: every page needs a type
  should:   [id]              # every page SHOULD carry a stable `id` (engine base-schema floor; advisory)
# NOTE: `strict_types` is ENGINE-OWNED (set in the engine's base-schema, default
# false = unknown types allowed if they satisfy okf.required). It is NOT pack-
# settable — under composition a pack can't loosen/tighten the global taxonomy —
# so don't declare it here (framework validate WARNs if you do).
common_optional: [id, title, description, tags, created, updated, related, sources, tlp, confidence,
                  aliases, indicator_type, value, threat, malware_family, first_seen, last_seen,
                  infra_type, asn, hosting_provider, country]

# How each namespace buckets on disk (read by okf_migrate / reshelve / reshard).
partitioning:
  reshard_over: 500
  namespaces:
    entities:    {strategy: by-letter, reshard_by: second-letter}
    indicators:  {strategy: by-date, date_field: first_seen, reshard_by: month}   # IOCs: high-volume, time-ordered
    sources:     {strategy: by-date, date_field: published, reshard_by: day}
    concepts:    {strategy: by-letter, reshard_by: second-letter}
    predictions: {strategy: flat}
    findings:    {strategy: flat}                                   # human-authored (see permissions)
    briefings:   {strategy: flat}                                   # daily brief — one dated page/day
    trends:      {strategy: flat}                                   # dated, directional trend pages (okengine#37)

# The agent's load-first working set (build_hot_set -> wiki/HOT.md).
hot_set:
  days: 30
  cap: 300
  sections:
    - {kind: open, namespace: predictions, status_field: status, open_values: [open, active], secondary_field: resolves_by, title: "Open predictions"}
    - {kind: recent, namespace: sources, date_field: published, layout: by-date, title: "Recent sources"}
    - {kind: recent, namespace: entities, date_field: updated, show_type: true, title: "Recently-updated entities"}

# Write-permission matrix (conformance G2) — enforced by the MCP write path.
# default delete:false => tombstone, never hard-rm; a namespace may set
# create/update:false to mark it human-authored.
permissions:
  default: {create: true, update: true, delete: false}
  namespaces:
    # Human-only gate: analysts author findings (via git); the agent may READ but
    # not create/update them. Drop this block if your domain has no such gate.
    findings: {create: false, update: false}

# Review trust model (conformance G3) — FLAG, not gate. Asserting a categorical
# verdict lands the write but flags it (needs_review). Numeric / low-med-high never flag.
review:
  confidence_field: confidence
  confidence_review_values: [confirmed, false-positive, refuted]
  review_on_change_fields: []

# Hot/warm/cold tiers (conformance G4) — DERIVED at query time, never stored.
tier:
  hot_days: 30
  warm_days: 365
  namespaces:
    sources:     {date_field: published, from_path: true}
    indicators:  {date_field: first_seen, from_path: true}
    entities:    {date_field: updated}
    concepts:    {date_field: updated}
    predictions: {date_field: resolves_by, status_field: status, open_values: [open, active], open_floor: hot}
    briefings:   {date_field: published}
    trends:      {date_field: updated}

# Page types + required (identity/load-bearing) fields. Keep `required` minimal so the
# write-gate never rejects a legitimately-shaped page; everything else is optional.
types:
  # --- the OKF core is ENGINE-owned & INHERITED — do NOT declare it here ---
  # The universal spine (source, concept, prediction, finding, dashboard, briefing,
  # trend + the core namespaces) lives in the engine's config/base-schema.yaml and is
  # merged UNDER this pack automatically (okengine#90 P2). Re-declaring a core type
  # breaks composition. Declare ONLY your DOMAIN types below. To add a field to a core
  # type, use `extends:` (additive + OPTIONAL only — never required/tightening).
  # See docs/core-types-and-extensions.md.

  # --- DOMAIN types (okpack-indicators owns these) ---
  # `indicator` — an atomic observable (a malicious URL / domain / IP / file hash). High-volume +
  # time-ordered, so it lives in its own date-bucketed `indicators/` tree (not entities/).
  # `infrastructure` — adversary infrastructure an indicator resolves to / is hosted on (an ASN, a
  # hosting provider, a C2 cluster). A longer-lived entity in the shared entities/ tree.
  indicator:      {required: [type], owner: okpack-indicators}
  infrastructure: {required: [type], owner: okpack-indicators}

# --- engine cron inputs (all OPTIONAL; the engine ships no domain taxonomy) ---
# The maintenance drains/audits/classifiers read these here instead of hardcoding
# any domain vocabulary. Leave them empty for generic behaviour; fill them to
# teach the engine your taxonomy. Type references must name a key in `types:`.

# Canonicalize legacy / alias type names onto a `types:` key (schema-type-drain proposes the rename).
# `ioc` is the common shorthand for an indicator; `host` a legacy STIX-ish name for infrastructure.
type_aliases: {ioc: indicator, host: infrastructure}

# Types whose pages are operational/derived — exempt from type-conformance drift.
operational_types: []

# Indicators are atomic (thin by nature) — do NOT depth-gate them; infrastructure warrants depth.
depth_critical_types: [infrastructure]

# Hints for schema-classify-drain: a canonical type -> tags that imply it.
classify_hints:
  indicator: [ioc, url, domain, ip, hash, observable]
  infrastructure: [asn, host, hosting, c2, netblock]

# Closed value vocabularies. A missing value never fails; a WRONG value fails unless the field is
# `extensible: true` (open vocab — unknown values warn instead). validate.py checks well-formedness;
# conformance checks page frontmatter against them.
enums:
  # source_kind EXTENDS the engine-core vocabulary with the IOC-feed value (union at merge).
  source_kind:    [feed, advisory, vendor-blog, report, commentary]
  indicator_type: [url, domain, ip, ipv4, ipv6, md5, sha1, sha256, email, filename, registry-key]
  infra_type:     [asn, netblock, hosting-provider, c2, name-server, sinkhole, cdn]

# Which frontmatter field draws from which enum (`by_type:` scopes a field to a page type).
field_enums:
  source_kind:    {enum: source_kind}
  indicator_type: {by_type: {indicator: indicator_type}}
  infra_type:     {by_type: {infrastructure: infra_type}}

# Reader top section — the synthesized brief pinned above raw storage namespaces. The reader
# lands on the newest briefings/ page by default (okengine briefings-by-default). Add your other
# synthesized namespaces (e.g. predictions, findings) to surface them together as one section.
rail_top_section:
  label: ANALYSIS
  namespaces: [briefings, trends, predictions, findings]

# Catch-all types the classifier should disambiguate (re-typed alongside bare
# `entity` pages).  e.g. [entity]
classify_catchall: []

# Curated frontmatter fields the write path must never silently drop (detect-field-loss guards these).
protected_fields: [value, indicator_type, threat, first_seen]
