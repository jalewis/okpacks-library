# okpack-incidents co-install — host-schema ADDITIONS (taxonomy-augmenting shape; docs/authoring-a-pack.md §8).
# Single-source rule: a SUBSET of the standalone schema.yaml (`incident` + `identity`). Host wins on
# collision. These are the event-layer types the pack mints; incidents wikilink the host's actor/cve world.
types:
  incident:
    required: [type]
    id_authority: incident
    id_field: incident_id
  identity:
    required: [type]
# legacy/STIX identity names resolve to `identity` in the composed host (okengine#181); breach/event -> incident.
type_aliases:
  organization: identity
  company: identity
  person: identity
  agency: identity
  government-agency: identity
  government-entity: identity
  team: identity
  breach: incident
  event: incident

# Cockpit tab this pack contributes to a composed vault (merged by install-domain).
cockpit:
  tabs:
  - incidents
  tab_defs:
    incidents:
      label: Incidents
      boxes:
      - title: Incident corpus
        span: 12
        view: bignums
        dataset:
          dir: security-incidents
          type: incident
        items:
        - label: incidents
          stat: count
      - title: By sector
        span: 6
        view: bars
        dataset:
          dir: security-incidents
          type: incident
        group_by: industry
        limit: 8
        labels:
          '622110': Hospitals
          '923140': Veterans' affairs
          '621111': Physicians' offices
          '611310': Colleges & universities
          '921120': Legislative bodies
          '522110': Commercial banking
          '611110': K-12 schools
          '921130': Public finance
      - title: By incident type
        span: 6
        view: bars
        dataset:
          dir: security-incidents
          type: incident
        group_by: incident_type
        tone: warn
        limit: 6
