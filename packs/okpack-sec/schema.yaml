# OKF domain contract for: okpack-sec — the public security reference pack.
# This is the machine form of OKF-SEC-SPEC.md (the normative profile). The engine
# reads this (never hardcodes layout). Canonical type names follow STIX 2.1 SDOs where one
# exists; legacy/vault names are accepted via `type_aliases`. See the spec for projection.
version: 1
okf_sec_version: "0.2"   # okf-sec spec version this pack conforms to (spec §12.1)
apply_under: [wiki/]
exclude:
  - wiki/operational/
  - wiki/observations/   # per-source records (multi-source MDM; okengine#38) — hidden from the
                         # browse rail; reached via drill-down from the canonical entity page

okf:
  required: [type]            # OKF v0.1 base: every page needs a type
# Envelope fields any page MAY carry (see spec §2). `refs` = cross-standard ID list
# ({std,id,url} -> STIX external_references); `rels` = typed predicates (-> STIX SROs).
common_optional: [title, name, description, aliases, tags, created, updated,
                  first_seen, last_seen, related, rels, sources, refs, tlp,
                  mitre_id, cve_id, confidence]

# How each namespace buckets on disk (read by okf_migrate / reshelve / reshard).
partitioning:
  reshard_over: 500
  namespaces:
    entities:    {strategy: by-letter, reshard_by: second-letter}   # all entity-typed pages (STIX SDO nouns)
    sources:     {strategy: by-date, date_field: published, reshard_by: day}
    concepts:    {strategy: by-letter, reshard_by: second-letter}
    predictions: {strategy: flat}
    findings:    {strategy: flat}                                   # analyst output — human-authored (see permissions)
    briefings:   {strategy: flat}                                   # daily brief — one dated page/day (cron: okpack-sec-threat-brief)

# The agent's load-first working set (build_hot_set -> wiki/HOT.md).
hot_set:
  days: 30
  cap: 300
  sections:
    - {kind: open, namespace: predictions, status_field: status, open_values: [open, active], secondary_field: resolves_by, title: "Open predictions"}
    - {kind: recent, namespace: sources, date_field: published, layout: by-date, title: "Recent sources"}
    - {kind: recent, namespace: entities, date_field: updated, show_type: true, title: "Recently-updated entities"}

# Write-permission matrix (conformance G2) — enforced by the MCP write path
# (okengine-write). default delete:false => tombstone, never hard-rm; a
# namespace may set create/update:false to mark it human-authored.
permissions:
  default: {create: true, update: true, delete: false}
  namespaces:
    # OKF-SEC human-only gate: analysts author findings (via git), the agent may
    # READ but not create/update them — enforced at the MCP write path.
    findings: {create: false, update: false}

# Review trust model (conformance G3) — FLAG, not gate. An agent asserting a
# categorical confidence verdict (or a review field) doesn't block; the write
# lands and the page is flagged (needs_review + wiki/_review-queue.md). Numeric
# confidence + low/med/high never flag.
review:
  confidence_field: confidence
  confidence_review_values: [confirmed, false-positive, refuted]
  review_on_change_fields: []

# Hot/warm/cold tiers (conformance G4) — DERIVED at query time (tier_lib), never
# stored. Read by the tier-refresh cron + the --tier filter in kb_search/okengine-mcp.
# by-date namespaces derive the date from the path; open predictions floor at hot.
tier:
  hot_days: 30
  warm_days: 365
  namespaces:
    sources:     {date_field: published, from_path: true}
    entities:    {date_field: updated}
    concepts:    {date_field: updated}
    predictions: {date_field: resolves_by, status_field: status, open_values: [open, active], open_floor: hot}
    briefings:   {date_field: published}

# OKF-SEC types (canonical = STIX 2.1 SDO name where one exists; see spec §3–7).
# RULE: types carry *kind*, fields carry *specificity* — a CVE is a `vulnerability`
# with a cve_id, not its own type. Required lists hold identity/load-bearing fields
# only (flag-not-gate: a missing required field flags for review, never rejects).
types:
  # Composable-okpacks identity (engine conformance §5): `owner` = the pack that mutates the type
  # (all okf-sec types are owned by okpack-sec); `id_authority`/`id_field` mint a deterministic
  # `<authority>:<id>` page id (else the engine mints a slug). mitre/cve-backed types declare theirs.
  # --- intel provenance: Admiralty-scored; projects to STIX `report` ---
  source:           {required: [type, source_kind, publisher, published, reliability, credibility], owner: okpack-sec}
  # --- security entities (live under wiki/entities/, bucketed by letter) ---
  vulnerability:    {required: [type], id_authority: cve, id_field: cve_id, owner: okpack-sec}   # cve_id nullable (0-days) → minted-slug fallback
  attack-pattern:   {required: [type, mitre_id], id_authority: mitre, id_field: mitre_id, owner: okpack-sec}   # ATT&CK (sub)technique [alias: technique]
  threat-actor:     {required: [type], owner: okpack-sec}                 # a named INDIVIDUAL human operator (rare); groups/crews → intrusion-set
  intrusion-set:    {required: [type], owner: okpack-sec}                 # DEFAULT for any named adversary group/cluster/crew (APT29, ransomware crews) [alias: group]
  malware:          {required: [type], owner: okpack-sec}                 # category (ransomware/loader/…) is a field
  tool:             {required: [type], owner: okpack-sec}                 # legitimate/dual-use tooling used by actors
  software:         {required: [type], owner: okpack-sec}                 # affected/benign software/product [alias: product]
  campaign:         {required: [type], owner: okpack-sec}                 # a named operation
  incident:         {required: [type], owner: okpack-sec}                 # a security incident: breach / attack-event (STIX 2.1 incident SDO); fields: incident_type, sector, affected_count, date_disclosed, vector, data_exposed, actor→intrusion-set
  indicator:        {required: [type, ioc_type, value], owner: okpack-sec}   # ioc_type: ip|domain|hash|url|email [alias: ioc] — named only
  infrastructure:   {required: [type], owner: okpack-sec}                 # adversary/asset infra: ASN, IP block, C2 [alias: host]
  identity:         {required: [type, identity_class], owner: okpack-sec} # vendor/org/person/agency [aliases below]
  course-of-action: {required: [type, mitre_id], id_authority: mitre, id_field: mitre_id, owner: okpack-sec}   # ATT&CK Mxxxx [alias: mitigation]
  detection:        {required: [type, rule_format], owner: okpack-sec}    # sigma|yara|suricata|… (okf-native; no STIX SDO)
  concept:          {required: [type], owner: okpack-sec}                 # segment / TTP cluster / pattern (grouping; no SDO)
  # --- analyst output + synthesis (okf-native / OCSF layer) ---
  finding:          {required: [type, severity, status], owner: okpack-sec}   # human-authored; severity required = okpack-sec tightening vs base [type,status] (spec §10.6); -> OCSF finding
  prediction:       {required: [type, status, confidence, subject, resolves_by], owner: okpack-sec}
  dashboard:        {required: [type, title], owner: okpack-sec}

# Legacy/vault type names accepted on read & normalized to canonical (spec §1, §7).
# `entity` (generic catch-all) is intentionally NOT aliased — it must be retyped.
type_aliases:
  cve:                vulnerability
  technique:          attack-pattern
  ioc:                indicator
  host:               infrastructure
  product:            software
  group:              intrusion-set
  apt-group:          intrusion-set
  mitigation:         course-of-action
  ransomware:         malware
  ransomware-family:  malware
  vendor:             identity
  organization:       identity
  company:            identity
  person:             identity
  agency:             identity
  government-agency:  identity
  government-entity:  identity
  team:               identity

# Field-drift normalization — applied by the okengine-write MCP before write (okengine#46),
# so agent writes converge on this pack's vocabulary instead of drifting. field_aliases rename
# a key; value_aliases map a field's values. (status is intentionally NOT here: "active" is a
# valid prediction/exploitation_status value, only entities use "live" — too contextual to
# remap blindly.)
field_aliases:
  country:      suspected_origin
  origin:       suspected_origin
  nation:       suspected_origin
value_aliases:
  suspected_origin:          # ISO-3166 alpha-2 -> the full names this vault uses canonically
    CN: China
    US: United States
