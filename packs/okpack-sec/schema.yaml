# Reader "browse by kind" groups — label -> page types. The okengine-reader reads
# these to offer a BY KIND rail (e.g. all "Threat actors" across namespaces),
# independent of the by-letter on-disk partitioning. Pure presentation; the engine
# is domain-agnostic, so the security labels live here in the pack.
display_groups:
  Threat actors:      [intrusion-set, threat-actor]
  Malware & tooling:  [malware, tool, software]
  ATT&CK techniques:  [attack-pattern]
  Vulnerabilities:    [vulnerability]
  Campaigns:          [campaign]
  Incidents:          [incident]
  Defenses:           [course-of-action, detection]
  Indicators & infra: [indicator, infrastructure, identity]

# Reader top "outputs" section — the SYNTHESIZED products (what you read), pinned
# above the raw storage namespaces. The reader shows `label` as the first rail
# section, listing the member namespaces that have pages (so predictions/trends
# slot in automatically as they fill). Distinct from `namespaces` on disk.
rail_top_section:
  label: ANALYSIS
  namespaces: [briefings, trends, predictions, findings]

# Source-reliability registry (multi-source entity resolution; okengine#38). Each ingest
# source carries a STANDING Admiralty reliability (A-F) used as the fusion weight when two
# sources disagree on a canonical entity's field. The `key` is the observations/<key>/
# subdir AND the `source:` stamp each importer writes onto its observation pages; the
# deterministic canonical assembler reads this to pick the headline value (preserving all
# values with attribution + flagging material conflicts). `credibility` is per-claim — from
# the source when it expresses one, else `credibility_default`. Reference datasets declare
# reliability here; agent-ingested FEED sources are Admiralty-scored per page instead and
# carry their own. `reliability`/`credibility_default` reuse the enums below.
source_registry:
  mitre-attack:
    name: "MITRE ATT&CK"
    class: framework            # framework | vendor | community | government | feed
    url: https://attack.mitre.org/
    reliability: A              # authoritative, peer-reviewed taxonomy
    credibility_default: "2"
    # attack_import.py: technique/group/software/mitigation catalog. attack_refs_import.py: mints
    # citing `source` pages from each group's external_references bibliography (okpacks-library#2).
    importers: [okpack_sec_attack_import.py, okpack_sec_attack_refs_import.py]
  thaicert:
    name: "ThaiCERT / ETDA Threat Group Cards"
    class: community
    url: https://apt.etda.or.th/
    reliability: B              # well-curated community encyclopedia
    credibility_default: "3"
    importers: [okpack_sec_tgc_import.py, okpack_sec_tgc_tools_import.py]
  cisa-kev:
    name: "CISA Known Exploited Vulnerabilities"
    class: government
    url: https://www.cisa.gov/kev
    reliability: A              # govt confirmation of active exploitation
    credibility_default: "1"
    importers: [okpack_sec_kev_import.py]
  nvd:
    name: "NVD (NIST National Vulnerability Database)"
    class: government
    url: https://nvd.nist.gov/
    reliability: A
    credibility_default: "2"
    importers: [okpack_sec_nvd_import.py]
  microsoft:
    name: "Microsoft Threat Intelligence (+ MS/CrowdStrike Rosetta Stone)"
    class: vendor
    url: https://github.com/microsoft/mstic
    reliability: A              # first-party telemetry, broad visibility
    credibility_default: "2"
    importers: [okpack_sec_msft_import.py]   # MicrosoftMapping.json (Rosetta Stone alias backbone)

# Canonical-assembly merge policy (multi-source fusion; okengine#38). How the deterministic
# assembler (canonical_assemble.py) fuses each field across a canonical entity's per-source
# observations:
#   union     — combine all values, deduped, order-stable (additive sets/relationships).
#   consensus — headline value = highest source reliability (recency tiebreak); ALL distinct
#               values preserved with attribution; >1 distinct value flags review (G3).
#   latest    — most-recently-observed value wins (evolving status).
# A field not listed defaults by value shape: lists -> union, scalars -> consensus. Names
# match entity frontmatter (common_optional + per-type fields).
merge_policy:
  union:     [aliases, target_sectors, tags, refs, rels, sources, related, malware_type,
              motivation]   # multi-valued: different source cards list different subsets
  consensus: [suspected_origin, category, severity, cvss, tlp, identity_class,
              actor_class, sophistication, resource_level, ioc_type, infra_type]
              # cvss is consensus (not latest): sources (NVD/KEV/vendor) legitimately
              # disagree on the vector — preserve all with attribution + flag, don't let
              # the newest silently win (okengine#40).
  latest:    [last_seen, exploitation, kev, epss]

# Closed value vocabularies — machine form of OKF-SEC-SPEC.md §9.2. The engine
# ignores these keys; this repo's validate.py checks page frontmatter values against them
# (a missing value never fails; a WRONG value fails unless the field is marked extensible).
enums:
  tlp:                 [clear, green, amber, amber+strict, red]
  severity:            [none, low, medium, high, critical]
  reliability:         [A, B, C, D, E, F]
  credibility:         ["1", "2", "3", "4", "5", "6"]
  source_kind:         [advisory, vendor-research, incident-report, news, blog]
  bias_flags:          [vendor-commercial, single-witness, attribution-speculative, sensationalized, state-aligned]
  ioc_type:            [ip, domain, hash, url, email, file, mutex, registry-key, user-agent]
  infra_type:          [asn, ip-block, c2, server, domain-front, botnet, hosting-malware,
                        phishing, staging, exfiltration, anonymization, reconnaissance, undefined]
  identity_class:      [individual, group, organization, system, class, unknown]
  sector:              [agriculture, aerospace, automotive, chemical, commercial, communications,
                        construction, defense, education, energy, entertainment, financial-services,
                        government, healthcare, hospitality-leisure, infrastructure, insurance,
                        manufacturing, mining, non-profit, pharmaceuticals, retail, technology,
                        telecommunications, transportation, utilities]
  actor_class:         [nation-state, crime-syndicate, criminal, hacker, activist, insider-accidental,
                        insider-disgruntled, competitor, spy, terrorist, sensationalist, unknown]
  sophistication:      [none, minimal, intermediate, advanced, expert, innovator, strategic]
  resource_level:      [individual, club, contest, team, organization, government]
  motivation:          [accidental, coercion, dominance, ideology, notoriety, organizational-gain,
                        personal-gain, personal-satisfaction, revenge, unpredictable]
  malware_category:    [adware, backdoor, bootkit, bot, ddos, downloader, dropper, exploit-kit,
                        keylogger, ransomware, remote-access-trojan, resource-exploitation,
                        rogue-security-software, rootkit, screen-capture, spyware, trojan, virus,
                        webshell, wiper, worm, unknown]
  tool_category:       [denial-of-service, exploitation, information-gathering, network-capture,
                        credential-exploitation, remote-access, vulnerability-scanning, unknown]
  rule_format:         [sigma, yara, yara-l, suricata, snort, kql, spl, eql, osquery]
  exploitation_status: [unreported, poc, active, weaponized]
  prediction_status:   [open, confirmed, refuted, partial, expired-ungraded]
  finding_status:      [investigating, open, confirmed, resolved, dismissed]
  incident_type:       [breach, data-leak, ransomware, extortion, defacement, ddos, wiper,
                        supply-chain, espionage, bec, fraud, account-compromise, outage, unknown]
  horizon:             [short, medium, long, strategic]
  ref_std:             [cve, cwe, capec, mitre-attack, mitre-d3fend, nvd, ghsa, cpe, cisa-kev,
                        epss, misp, stix, vendor-advisory, url]
  cvss_version:        ["2.0", "3.0", "3.1", "4.0"]

# Which frontmatter field draws from which enum. `enum:` applies to any type; `by_type:`
# scopes a field whose vocabulary depends on the page type. `extensible: true` => unknown
# values WARN (open vocab) instead of FAIL. Dotted keys address a nested scalar/list.
field_enums:
  tlp:                 {enum: tlp}
  severity:            {enum: severity}
  reliability:         {enum: reliability}
  credibility:         {enum: credibility}
  source_kind:         {enum: source_kind}
  bias_flags:          {enum: bias_flags, extensible: true}
  ioc_type:            {enum: ioc_type, extensible: true}
  infra_type:          {enum: infra_type}
  identity_class:      {enum: identity_class}
  actor_class:         {enum: actor_class}
  sophistication:      {enum: sophistication}
  resource_level:      {enum: resource_level}
  rule_format:         {enum: rule_format, extensible: true}
  horizon:             {enum: horizon}
  exploitation.status: {enum: exploitation_status}
  motivation.primary:  {enum: motivation}
  motivation.secondary: {enum: motivation}
  targets.sectors:     {enum: sector, extensible: true}
  incident_type:       {enum: incident_type, extensible: true}
  status:              {by_type: {prediction: prediction_status, finding: finding_status}}
  category:            {by_type: {malware: malware_category, tool: tool_category}}

# Controlled `rels:` predicate vocabulary (machine form of spec §6). validate.py warns on a page
# `rels` key outside this set (flag-not-gate, per §6.4). Canonical predicate name == STIX
# relationship_type; reverse aliases flip on projection; okf-native have no STIX SRO.
rels_vocabulary:
  canonical: [uses, uses-technique, uses-malware, uses-tool, targets, attributed-to, authored-by,
              owns, compromises, exploits, delivers, downloads, drops, variant-of, communicates-with,
              beacons-to, exfiltrates-to, controls, consists-of, hosts, resolves-to, indicates,
              mitigates, subtechnique-of, originates-from, located-at, related-to]
  reverse: [used-by, exploited-by, mitigated-by, detected-by, owned-by, hosted-by, affected-by,
            attributed-campaigns]
  okf_native: [detects, affects]

# Enum checks for list-of-object fields — each item's subkey value ∈ the named enum.
# `extensible: true` => unknown value warns (open vocab) instead of failing.
list_field_enums:
  refs:
    std:      {enum: ref_std, extensible: true}
  cvss:
    version:  {enum: cvss_version}
    severity: {enum: severity}
