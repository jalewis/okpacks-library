# OKF domain contract for: okpack-threat-landscape — Threat-Landscape / Annual-Report Intelligence.
# The engine reads this (never hardcodes layout) — types + partitioning + hot_set.
version: 1
apply_under: [wiki/]

exclude:
  - wiki/operational/
  - wiki/dashboards/
  - wiki/examples/

okf:
  required: [type]
  should:   [id]
common_optional: [id, title, description, tags, created, updated, related, sources, tlp, confidence,
                  aliases, vendor, year, report_theme, published]

partitioning:
  reshard_over: 500
  namespaces:
    entities:    {strategy: by-letter, reshard_by: second-letter}   # vendors
    metrics:     {strategy: by-letter, reshard_by: second-letter}   # tracked statistics
    sources:     {strategy: by-date, date_field: published, reshard_by: day}   # the annual reports
    concepts:    {strategy: by-letter, reshard_by: second-letter}   # landscape themes
    predictions: {strategy: flat}
    briefings:   {strategy: flat}
    trends:      {strategy: flat}                                   # theme emergence / metric movement

hot_set:
  days: 90
  cap: 300
  sections:
    - {kind: recent, namespace: trends, date_field: updated, title: "Recent landscape shifts"}
    - {kind: recent, namespace: sources, date_field: published, layout: by-date, title: "Recent reports"}
    - {kind: recent, namespace: metrics, date_field: updated, title: "Recently-updated metrics"}

permissions:
  default: {create: true, update: true, delete: false}
  namespaces: {}

review:
  confidence_field: confidence
  confidence_review_values: [confirmed, false-positive, refuted]
  review_on_change_fields: []

tier:
  hot_days: 120          # annual cadence — a wider hot window than the actor pack
  warm_days: 800
  namespaces:
    sources:     {date_field: published, from_path: true}
    entities:    {date_field: updated}
    metrics:     {date_field: updated}
    concepts:    {date_field: updated}
    predictions: {date_field: resolves_by, status_field: status, open_values: [open, active], open_floor: hot}
    briefings:   {date_field: published}
    trends:      {date_field: updated}

# DOMAIN types. `publisher` lives in entities/, `metric` in its own metrics/ tree. Core types inherited.
types:
  publisher:  {required: [type], owner: okpack-threat-landscape}   # a firm/agency publishing reports
  metric:     {required: [type], owner: okpack-threat-landscape}   # a statistic tracked across reports/years

# `vendor` was the former name for the `publisher` type (renamed to free `vendor` — okpack-vendor-risk
# owns that type — okengine#181); schema_type_drain remaps a legacy `type: vendor` page to `publisher`.
# NOTE: `vendor` also survives as a FRONTMATTER FIELD (which firm a metric/source is attributed to) —
# that is a field, not a type, and is unaffected by this alias.
type_aliases: {statistic: metric, kpi: metric}
operational_types: []
depth_critical_types: [metric]
classify_hints:
  publisher: [publisher, firm, agency, research-house]
  metric: [statistic, kpi, figure, indicator]
classify_catchall: []  # bare `entity` is always selected by the engine
protected_fields: [metric_values, vendor, report_theme]

enums:
  # landscape themes — the taxonomy theme_trends.py counts across years (extensible: new themes warn)
  report_theme: [ransomware, data-breach, threat-intelligence, vulnerability-management, cloud-security,
                 identity-security, supply-chain, zero-trust, ai-security, phishing-social-engineering,
                 ot-ics-security, insider-threat, ddos, api-security, incident-response, nation-state]
  report_category: [analysis, survey]
  metric_direction: [up, down, flat, mixed]
  metric_unit: [percent, usd, days, count, ratio, other]
  # the core source_kind enum extended with the report kinds this pack ingests
  source_kind: [annual-report, threat-report, survey, advisory, commentary]

field_enums:
  report_theme:    {enum: report_theme, extensible: true}
  report_category: {enum: report_category}
  metric_direction: {by_type: {metric: metric_direction}}
  metric_unit:     {by_type: {metric: metric_unit}, extensible: true}
  source_kind:     {enum: source_kind}

rail_top_section:
  label: LANDSCAPE
  namespaces: [trends, metrics, briefings]

# surface metrics grouped by theme in the reader
display_groups:
  metrics: {by_field: report_theme}
